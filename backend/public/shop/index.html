<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>积分商城管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; min-height: 100vh;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a0f1e; color: #fff;
    }
    /* 鉴权前隐藏，防止普通用户看到页面内容闪烁 */
    body.auth-pending { visibility: hidden; }

    /* 非管理员提示遮罩 */
    .no-access-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0f1e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
    }
    .no-access-icon { font-size: 56px; }
    .no-access-title { font-size: 18px; font-weight: 700; color: #fff; }
    .no-access-sub { font-size: 14px; color: rgba(255,255,255,0.45); }

    /* ===== 顶部导航（单行，高度固定 52px）===== */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 52px;
      background: rgba(10,15,30,0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-title { font-size: 16px; font-weight: 700; }
    .nav-user { font-size: 12px; color: rgba(255,255,255,0.45); margin-left: 8px; }
    .nav-left { display: flex; align-items: center; }
    .nav-logout {
      background: none; border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6); font-size: 12px;
      padding: 4px 10px; border-radius: 6px; cursor: pointer; white-space: nowrap;
    }

    /* ===== 标签页（紧贴导航栏下方，top: 52px）===== */
    .tabs {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 49;
      height: 44px;
      background: rgba(10,15,30,0.97);
      display: flex; align-items: stretch;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      overflow-x: auto;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1; min-width: 72px; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.4);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; white-space: nowrap; padding: 0 4px;
    }
    .tab.active { color: #0dd3ff; border-bottom-color: #0dd3ff; }

    /* 内容区，顶部留出 nav(52) + tabs(44) = 96px */
    .content { padding: 104px 16px 80px; max-width: 600px; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ===== 扫码兑换面板 ===== */
    .product-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 16px; margin-bottom: 16px;
    }
    .product-select-title {
      font-size: 14px; font-weight: 600; margin-bottom: 12px;
      color: rgba(255,255,255,0.7);
    }
    .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .product-option {
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .product-option.selected { border-color: #0dd3ff; background: rgba(13,211,255,0.08); }
    .product-option:hover { background: rgba(255,255,255,0.06); }
    .product-option-img {
      width: 56px; height: 56px; border-radius: 8px; object-fit: cover;
      margin: 0 auto 8px; background: rgba(255,255,255,0.05); display: block;
    }
    .product-option-name {
      font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-option-points { font-size: 12px; color: #ffd700; font-weight: 700; }
    .product-option-stock { font-size: 11px; color: rgba(255,255,255,0.3); }

    .scan-section { text-align: center; padding: 16px 0; }
    .scan-btn {
      width: 140px; height: 140px; border-radius: 50%;
      background: linear-gradient(135deg, #1a6fd4, #0dd3ff);
      border: none; color: #fff; font-size: 44px; cursor: pointer;
      box-shadow: 0 0 50px rgba(13,211,255,0.3); transition: all 0.3s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .scan-btn span { font-size: 13px; margin-top: 6px; font-weight: 600; }
    .scan-btn:hover { transform: scale(1.05); }
    .scan-btn:active { transform: scale(0.95); }
    .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .scan-tip { color: rgba(255,255,255,0.4); font-size: 13px; }

    .manual-input {
      margin-top: 16px; padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    }
    .manual-title { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
    .manual-row { display: flex; gap: 8px; }
    .manual-row input {
      flex: 1; padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #fff; font-size: 13px;
    }
    .manual-row input:focus { outline: none; border-color: #0dd3ff; }
    .manual-row button {
      padding: 10px 14px;
      background: linear-gradient(135deg, #1a6fd4, #0dd3ff);
      border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }

    /* ===== 活动扫码面板（与商品扫码同样布局，绿色主题）===== */
    .activity-option {
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .activity-option.selected { border-color: #22c55e; background: rgba(34,197,94,0.08); }
    .activity-option:hover { background: rgba(255,255,255,0.06); }
    .activity-option-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .activity-option-points { font-size: 12px; color: #22c55e; font-weight: 700; }
    .activity-option-desc { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .scan-btn-green {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      box-shadow: 0 0 50px rgba(34,197,94,0.3);
    }

    /* ===== 商品管理面板 ===== */
    .section-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .add-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #1a6fd4, #0dd3ff);
      border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .add-btn-green {
      background: linear-gradient(135deg, #16a34a, #22c55e);
    }
    .product-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 14px; margin-bottom: 12px;
      display: flex; gap: 14px; align-items: center;
    }
    .product-img {
      width: 64px; height: 64px; border-radius: 10px; object-fit: cover;
      background: rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .product-desc {
      font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-meta { display: flex; gap: 12px; font-size: 12px; flex-wrap: wrap; }
    .product-meta-item { color: rgba(255,255,255,0.5); }
    .product-meta-item b { color: #ffd700; }
    .product-meta-item b.green { color: #22c55e; }
    .product-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .product-actions button {
      padding: 6px 12px; border-radius: 8px; font-size: 12px; border: none; cursor: pointer; font-weight: 500;
    }
    .btn-edit { background: rgba(13,211,255,0.15); color: #0dd3ff; }
    .btn-del { background: rgba(239,68,68,0.15); color: #ef4444; }
    .product-badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500;
    }
    .badge-active { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-inactive { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* ===== 兑换记录面板 ===== */
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .search-bar input {
      flex: 1; padding: 10px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: #fff; font-size: 13px;
    }
    .search-bar input:focus { outline: none; border-color: #0dd3ff; }
    .search-bar button {
      padding: 10px 16px;
      background: linear-gradient(135deg, #1a6fd4, #0dd3ff);
      border: none; border-radius: 10px;
      color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .search-bar .clear-btn {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
    }
    .record-item {
      padding: 14px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; margin-bottom: 10px;
    }
    .record-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .record-user { font-size: 14px; font-weight: 600; }
    .record-points { font-size: 14px; font-weight: 700; }
    .record-points.success { color: #ef4444; }
    .record-points.failed { color: rgba(255,255,255,0.3); }
    .record-points.refunded { color: #f59e0b; }
    .record-points.activity { color: #22c55e; }
    .record-points.quiz { color: #0dd3ff; }
    .record-mid { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
    .record-bottom { display: flex; justify-content: space-between; align-items: center; }
    .record-time { font-size: 12px; color: rgba(255,255,255,0.3); }
    .record-status { font-size: 11px; padding: 2px 8px; border-radius: 8px; }
    .record-status.success { background: rgba(34,197,94,0.15); color: #22c55e; }
    .record-status.failed { background: rgba(239,68,68,0.15); color: #ef4444; }
    .record-status.refunded { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .record-status.activity { background: rgba(34,197,94,0.12); color: #22c55e; }
    .record-status.quiz { background: rgba(13,211,255,0.12); color: #0dd3ff; }
    .btn-refund {
      padding: 4px 10px; border-radius: 6px; font-size: 11px; border: none; cursor: pointer;
      background: rgba(245,158,11,0.15); color: #f59e0b; font-weight: 500;
    }
    .btn-refund:hover { background: rgba(245,158,11,0.3); }
    .empty-tip { text-align: center; color: rgba(255,255,255,0.3); padding: 40px 0; font-size: 14px; }

    /* ===== 表单弹窗 ===== */
    .form-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px); z-index: 100;
      display: none; align-items: center; justify-content: center;
    }
    .form-overlay.show { display: flex; }
    .form-modal {
      width: 90%; max-width: 420px; background: #0d1b3e;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      padding: 24px; max-height: 85vh; overflow-y: auto;
    }
    .form-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; display: block; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: #fff; font-size: 14px; font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: #0dd3ff; }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .form-img-preview {
      width: 80px; height: 80px; border-radius: 10px; object-fit: cover;
      background: rgba(255,255,255,0.05); margin-top: 8px;
    }
    .form-upload-btn {
      padding: 8px 16px; background: rgba(255,255,255,0.08);
      border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px;
      color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer; margin-top: 8px;
    }
    .form-btns { display: flex; gap: 10px; margin-top: 20px; }
    .form-btns button {
      flex: 1; padding: 12px; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
    .btn-save { background: linear-gradient(135deg, #1a6fd4, #0dd3ff); color: #fff; }
    .btn-save-green { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; }

    /* ===== 摄像头扫码 ===== */
    .camera-overlay {
      position: fixed; inset: 0; background: #000; z-index: 200; display: none;
    }
    .camera-overlay.show { display: flex; flex-direction: column; }
    .camera-video { flex: 1; width: 100%; object-fit: cover; }
    .camera-frame {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 240px; height: 240px;
      border: 2px solid rgba(13,211,255,0.6); border-radius: 20px;
    }
    .camera-frame.green { border-color: rgba(34,197,94,0.6); }
    .camera-tip {
      position: absolute; bottom: 100px; left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,0.7); font-size: 14px;
    }
    .camera-close {
      position: absolute; top: 20px; right: 20px;
      width: 40px; height: 40px; background: rgba(255,255,255,0.2);
      border: none; border-radius: 50%; color: #fff; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ===== 兑换结果弹窗 ===== */
    .result-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px); z-index: 300;
      display: none; align-items: center; justify-content: center;
    }
    .result-overlay.show { display: flex; }
    .result-modal {
      width: 85%; max-width: 340px; background: #0d1b3e;
      border-radius: 24px; padding: 32px 24px; text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      animation: popIn 0.3s ease;
    }
    .result-modal.success { border-color: rgba(34,197,94,0.4); }
    .result-modal.error { border-color: rgba(239,68,68,0.4); }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .result-icon-big { font-size: 64px; margin-bottom: 16px; line-height: 1; }
    .result-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .result-title.success { color: #22c55e; }
    .result-title.error   { color: #ef4444; }
    .result-body { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.9; margin-bottom: 24px; }
    .result-body b { color: #fff; }
    .result-close-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #1a6fd4, #0dd3ff); color: #fff;
    }
    .result-close-btn.error-btn { background: rgba(239,68,68,0.2); color: #ef4444; }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <div class="nav">
    <div class="nav-left">
      <div class="nav-title">积分商城管理</div>
      <div class="nav-user" id="navUser"></div>
    </div>
    <button class="nav-logout" onclick="logout()">退出</button>
  </div>

  <!-- 标签页（5个）-->
  <div class="tabs">
    <div class="tab active" data-tab="scan" onclick="switchTab('scan')">扫码兑换</div>
    <div class="tab" data-tab="products" onclick="switchTab('products')">商品管理</div>
    <div class="tab" data-tab="activity-scan" onclick="switchTab('activity-scan')">活动积分</div>
    <div class="tab" data-tab="activities" onclick="switchTab('activities')">活动管理</div>
    <div class="tab" data-tab="records" onclick="switchTab('records')">兑换记录</div>
  </div>

  <div class="content">

    <!-- ===== 扫码兑换面板 ===== -->
    <div class="panel active" id="panel-scan">
      <div class="product-select">
        <div class="product-select-title">① 选择要兑换的商品</div>
        <div class="product-grid" id="productGrid"></div>
      </div>
      <div class="scan-section">
        <button class="scan-btn" id="scanBtn" onclick="startScan('redeem')" disabled>
          📷<span>扫码兑换</span>
        </button>
        <div class="scan-tip" id="scanTip">请先选择商品</div>
      </div>
      <div class="manual-input">
        <div class="manual-title">或手动粘贴二维码内容</div>
        <div class="manual-row">
          <input type="text" id="manualQR" placeholder="粘贴二维码内容">
          <button onclick="manualRedeem()">兑换</button>
        </div>
      </div>
    </div>

    <!-- ===== 商品管理面板 ===== -->
    <div class="panel" id="panel-products">
      <div class="section-header">
        <div class="section-title">商品列表</div>
        <button class="add-btn" onclick="openProductForm()">+ 添加商品</button>
      </div>
      <div id="productList"></div>
    </div>

    <!-- ===== 活动积分扫码面板 ===== -->
    <div class="panel" id="panel-activity-scan">
      <div class="product-select">
        <div class="product-select-title">① 选择要增加积分的活动</div>
        <div class="product-grid" id="activityGrid"></div>
      </div>
      <div class="scan-section">
        <button class="scan-btn scan-btn-green" id="actScanBtn" onclick="startScan('activity')" disabled>
          📷<span>扫码增分</span>
        </button>
        <div class="scan-tip" id="actScanTip">请先选择活动</div>
      </div>
      <div class="manual-input">
        <div class="manual-title">或手动粘贴二维码内容</div>
        <div class="manual-row">
          <input type="text" id="manualActQR" placeholder="粘贴二维码内容">
          <button onclick="manualActivityRedeem()" style="background:linear-gradient(135deg,#16a34a,#22c55e)">增加积分</button>
        </div>
      </div>
    </div>

    <!-- ===== 活动管理面板 ===== -->
    <div class="panel" id="panel-activities">
      <div class="section-header">
        <div class="section-title">活动列表</div>
        <button class="add-btn add-btn-green" onclick="openActivityForm()">+ 添加活动</button>
      </div>
      <div id="activityList"></div>
    </div>

    <!-- ===== 兑换记录面板 ===== -->
    <div class="panel" id="panel-records">
      <div class="section-header">
        <div class="section-title">兑换记录</div>
      </div>
      <div class="search-bar">
        <input type="text" id="searchEmployeeId" placeholder="输入工号搜索（如 E00xxxx）">
        <button onclick="searchRecords()">搜索</button>
        <button class="clear-btn" onclick="clearSearch()">清除</button>
      </div>
      <div id="recordList"></div>
    </div>
  </div>

  <!-- 商品编辑弹窗 -->
  <div class="form-overlay" id="productFormOverlay">
    <div class="form-modal">
      <div class="form-title" id="formTitle">添加商品</div>
      <input type="hidden" id="editProductId">
      <div class="form-group">
        <label class="form-label">商品名称 *</label>
        <input class="form-input" id="pName" placeholder="请输入商品名称">
      </div>
      <div class="form-group">
        <label class="form-label">商品描述</label>
        <textarea class="form-textarea" id="pDesc" placeholder="请输入商品描述"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">所需积分 *</label>
          <input class="form-input" id="pPoints" type="number" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">库存数量</label>
          <input class="form-input" id="pStock" type="number" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">排序</label>
          <input class="form-input" id="pSort" type="number" placeholder="0" value="0">
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <select class="form-select form-input" id="pActive">
            <option value="true">上架</option>
            <option value="false">下架</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">商品图片</label>
        <input type="file" id="pImageFile" accept="image/*" style="display:none" onchange="uploadImage(this)">
        <button class="form-upload-btn" onclick="document.getElementById('pImageFile').click()">选择图片上传</button>
        <input type="hidden" id="pImage">
        <img class="form-img-preview" id="pImagePreview" style="display:none">
      </div>
      <div class="form-btns">
        <button class="btn-cancel" onclick="closeProductForm()">取消</button>
        <button class="btn-save" onclick="saveProduct()">保存</button>
      </div>
    </div>
  </div>

  <!-- 活动编辑弹窗 -->
  <div class="form-overlay" id="activityFormOverlay">
    <div class="form-modal">
      <div class="form-title" id="actFormTitle">添加活动</div>
      <input type="hidden" id="editActivityId">
      <div class="form-group">
        <label class="form-label">活动名称 *</label>
        <input class="form-input" id="aName" placeholder="请输入活动名称">
      </div>
      <div class="form-group">
        <label class="form-label">活动描述</label>
        <textarea class="form-textarea" id="aDesc" placeholder="请输入活动描述"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">增加积分 *</label>
          <input class="form-input" id="aPoints" type="number" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <select class="form-select form-input" id="aActive">
            <option value="true">启用</option>
            <option value="false">停用</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">排序</label>
        <input class="form-input" id="aSort" type="number" placeholder="0" value="0">
      </div>
      <div class="form-btns">
        <button class="btn-cancel" onclick="closeActivityForm()">取消</button>
        <button class="btn-save btn-save-green" onclick="saveActivity()">保存</button>
      </div>
    </div>
  </div>

  <!-- 摄像头扫码 -->
  <div class="camera-overlay" id="cameraOverlay">
    <video class="camera-video" id="cameraVideo" autoplay playsinline></video>
    <div class="camera-frame" id="cameraFrame"></div>
    <div class="camera-tip">将二维码放入框内自动识别</div>
    <button class="camera-close" onclick="stopScan()">×</button>
  </div>

  <!-- 兑换结果弹窗 -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-modal" id="resultModal">
      <div class="result-icon-big" id="resultIconBig"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-body" id="resultBody"></div>
      <button class="result-close-btn" id="resultCloseBtn" onclick="closeResultModal()">确认</button>
    </div>
  </div>

  <!-- jsQR 库（本地化，避免CDN依赖） -->
  <script src="/shop/jsQR.min.js"></script>

  <script>
    const API_BASE = '/api';
    const token = localStorage.getItem('quiz_token');
    const user = JSON.parse(localStorage.getItem('quiz_user') || '{}');

    // 鉴权前先隐藏 body，防止页面内容闪烁
    document.body.classList.add('auth-pending');

    (function checkAuth() {
      if (!token) {
        // 未登录 → 跳转登录页
        window.location.replace('/app/login.html?redirect=' + encodeURIComponent('/shop/'));
        return;
      }
      if (!user.is_admin) {
        // 已登录但非管理员 → 显示提示后跳转 /app/
        document.body.classList.remove('auth-pending');
        document.body.innerHTML = `
          <div class="no-access-overlay">
            <div class="no-access-icon">🚫</div>
            <div class="no-access-title">非管理员无法访问</div>
            <div class="no-access-sub">即将返回用户页面…</div>
          </div>`;
        setTimeout(function() {
          window.location.replace('/app/');
        }, 1500);
        return;
      }
      // 管理员 → 正常显示
      document.body.classList.remove('auth-pending');
    })();

    document.getElementById('navUser').textContent = user.name || '';

    let selectedProductId = null;
    let selectedActivityId = null;
    let products = [];
    let activities = [];
    let cameraStream = null;
    let scanAnimFrame = null;
    let currentScanMode = 'redeem'; // 'redeem' | 'activity'

    // ===== 标签页切换 =====
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'scan') loadScanProducts();
      if (tab === 'products') loadProducts();
      if (tab === 'activity-scan') loadActivityScan();
      if (tab === 'activities') loadActivities();
      if (tab === 'records') loadRecords();
    }

    // ===== 扫码兑换（商品）=====
    async function loadScanProducts() {
      try {
        const res = await fetch(`${API_BASE}/products`);
        const data = await res.json();
        products = (data.products || []).filter(p => p.stock > 0);
        renderProductGrid();
      } catch(e) {}
    }

    function renderProductGrid() {
      const grid = document.getElementById('productGrid');
      if (products.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.3);padding:20px;font-size:13px">暂无可兑换商品</div>';
        return;
      }
      grid.innerHTML = products.map(p => `
        <div class="product-option ${selectedProductId === p.id ? 'selected' : ''}" onclick="selectProduct(${p.id})">
          ${p.image
            ? `<img class="product-option-img" src="${p.image}">`
            : '<div class="product-option-img" style="display:flex;align-items:center;justify-content:center;font-size:22px">🎁</div>'}
          <div class="product-option-name">${p.name}</div>
          <div class="product-option-points">${p.points} 积分</div>
          <div class="product-option-stock">库存 ${p.stock}</div>
        </div>
      `).join('');
    }

    function selectProduct(id) {
      selectedProductId = id;
      renderProductGrid();
      document.getElementById('scanBtn').disabled = false;
      const p = products.find(x => x.id === id);
      document.getElementById('scanTip').textContent = `已选：${p.name}（${p.points} 积分）`;
    }

    // ===== 活动积分扫码 =====
    async function loadActivityScan() {
      try {
        const res = await fetch(`${API_BASE}/admin/activities`, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        activities = (data.activities || []).filter(a => a.is_active);
        renderActivityGrid();
      } catch(e) {}
    }

    function renderActivityGrid() {
      const grid = document.getElementById('activityGrid');
      if (activities.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.3);padding:20px;font-size:13px">暂无启用的活动</div>';
        return;
      }
      grid.innerHTML = activities.map(a => `
        <div class="activity-option ${selectedActivityId === a.id ? 'selected' : ''}" onclick="selectActivity(${a.id})">
          <div style="font-size:28px;margin-bottom:8px">🎯</div>
          <div class="activity-option-name">${a.name}</div>
          <div class="activity-option-points">+${a.points} 积分</div>
          <div class="activity-option-desc">${a.description || ''}</div>
        </div>
      `).join('');
    }

    function selectActivity(id) {
      selectedActivityId = id;
      renderActivityGrid();
      document.getElementById('actScanBtn').disabled = false;
      const a = activities.find(x => x.id === id);
      document.getElementById('actScanTip').textContent = `已选：${a.name}（+${a.points} 积分）`;
    }

    // ===== 摄像头扫码通用 =====
    function startScan(mode) {
      currentScanMode = mode;
      if (mode === 'redeem' && !selectedProductId) { alert('请先选择商品'); return; }
      if (mode === 'activity' && !selectedActivityId) { alert('请先选择活动'); return; }
      const frame = document.getElementById('cameraFrame');
      frame.className = 'camera-frame' + (mode === 'activity' ? ' green' : '');
      document.getElementById('cameraOverlay').classList.add('show');
      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      }).then(stream => {
        cameraStream = stream;
        const video = document.getElementById('cameraVideo');
        video.srcObject = stream;
        video.play();
        scanQRCode();
      }).catch(err => {
        alert('无法访问摄像头：' + err.message + '\n请使用手动输入方式');
        stopScan();
      });
    }

    function scanQRCode() {
      const video = document.getElementById('cameraVideo');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code) {
            stopScan();
            if (currentScanMode === 'activity') {
              doActivityRedeem(code.data);
            } else {
              doRedeem(code.data);
            }
            return;
          }
        }
        scanAnimFrame = requestAnimationFrame(tick);
      }
      tick();
    }

    function stopScan() {
      document.getElementById('cameraOverlay').classList.remove('show');
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      if (scanAnimFrame) { cancelAnimationFrame(scanAnimFrame); scanAnimFrame = null; }
    }

    function manualRedeem() {
      const qrData = document.getElementById('manualQR').value.trim();
      if (!qrData) { alert('请输入二维码内容'); return; }
      if (!selectedProductId) { alert('请先选择商品'); return; }
      doRedeem(qrData);
    }

    function manualActivityRedeem() {
      const qrData = document.getElementById('manualActQR').value.trim();
      if (!qrData) { alert('请输入二维码内容'); return; }
      if (!selectedActivityId) { alert('请先选择活动'); return; }
      doActivityRedeem(qrData);
    }

    // ===== 商品兑换 =====
    async function doRedeem(qrData) {
      showResultModal('loading', '⏳', '处理中…', '正在验证并兑换，请稍候');
      try {
        const res = await fetch(`${API_BASE}/admin/redeem`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ qr_data: qrData, product_id: selectedProductId })
        });
        const data = await res.json();
        if (res.ok) {
          showResultModal(
            'success', '✅', '兑换成功！',
            `<b>${data.user_name}</b>（${data.employee_id}）<br>` +
            `商品：<b>${data.product_name}</b><br>` +
            `消耗积分：<b>${data.points_cost}</b><br>` +
            `剩余积分：<b>${data.remaining_points}</b>`
          );
          loadScanProducts();
        } else {
          let detail = data.error || '未知错误';
          if (data.required_points !== undefined) {
            detail += `<br>需要 <b>${data.required_points}</b> 积分，当前仅有 <b>${data.available_points}</b> 积分`;
          }
          showResultModal('error', '❌', '兑换失败', detail);
        }
      } catch(e) {
        showResultModal('error', '❌', '网络错误', '请检查网络连接后重试');
      }
    }

    // ===== 活动积分增加 =====
    async function doActivityRedeem(qrData) {
      showResultModal('loading', '⏳', '处理中…', '正在验证并增加积分，请稍候');
      try {
        const res = await fetch(`${API_BASE}/admin/activities/scan`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ qr_data: qrData, activity_id: selectedActivityId })
        });
        const data = await res.json();
        if (res.ok) {
          showResultModal(
            'success', '🎯', '积分增加成功！',
            `<b>${data.user_name}</b>（${data.employee_id}）<br>` +
            `活动：<b>${data.activity_name}</b><br>` +
            `增加积分：<b>+${data.points_added}</b><br>` +
            `当前可用积分：<b>${data.available_points}</b>`
          );
        } else {
          showResultModal('error', '❌', '增加积分失败', data.error || '未知错误');
        }
      } catch(e) {
        showResultModal('error', '❌', '网络错误', '请检查网络连接后重试');
      }
    }

    // ===== 兑换结果弹窗 =====
    function showResultModal(type, icon, title, body) {
      const overlay = document.getElementById('resultOverlay');
      const modal   = document.getElementById('resultModal');
      const closeBtn = document.getElementById('resultCloseBtn');
      document.getElementById('resultIconBig').textContent = icon;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultTitle').className = 'result-title ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
      document.getElementById('resultBody').innerHTML = body;
      modal.className = 'result-modal ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
      closeBtn.className = 'result-close-btn' + (type === 'error' ? ' error-btn' : '');
      overlay.classList.add('show');
    }

    function closeResultModal() {
      document.getElementById('resultOverlay').classList.remove('show');
      document.getElementById('manualQR').value = '';
      document.getElementById('manualActQR').value = '';
    }

    // ===== 商品管理 =====
    async function loadProducts() {
      try {
        const res = await fetch(`${API_BASE}/admin/products`, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const list = data.products || [];
        const el = document.getElementById('productList');
        if (list.length === 0) { el.innerHTML = '<div class="empty-tip">暂无商品，点击右上角添加</div>'; return; }
        el.innerHTML = list.map(p => `
          <div class="product-card">
            ${p.image
              ? `<img class="product-img" src="${p.image}">`
              : '<div class="product-img" style="display:flex;align-items:center;justify-content:center;font-size:26px">🎁</div>'}
            <div class="product-info">
              <div class="product-name">${p.name}
                <span class="product-badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">${p.is_active ? '上架' : '下架'}</span>
              </div>
              <div class="product-desc">${p.description || '暂无描述'}</div>
              <div class="product-meta">
                <div class="product-meta-item"><b>${p.points}</b> 积分</div>
                <div class="product-meta-item">库存 <b>${p.stock}</b></div>
                <div class="product-meta-item">排序 ${p.sort_order}</div>
              </div>
            </div>
            <div class="product-actions">
              <button class="btn-edit" onclick="editProduct(${p.id})">编辑</button>
              <button class="btn-del" onclick="deleteProduct(${p.id}, '${p.name}')">删除</button>
            </div>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('productList').innerHTML = '<div class="empty-tip">加载失败</div>';
      }
    }

    function openProductForm(product) {
      document.getElementById('productFormOverlay').classList.add('show');
      document.getElementById('formTitle').textContent = product ? '编辑商品' : '添加商品';
      document.getElementById('editProductId').value = product ? product.id : '';
      document.getElementById('pName').value = product ? product.name : '';
      document.getElementById('pDesc').value = product ? product.description : '';
      document.getElementById('pPoints').value = product ? product.points : '';
      document.getElementById('pStock').value = product ? product.stock : '';
      document.getElementById('pSort').value = product ? product.sort_order : 0;
      document.getElementById('pActive').value = product ? String(product.is_active) : 'true';
      document.getElementById('pImage').value = product ? (product.image || '') : '';
      const preview = document.getElementById('pImagePreview');
      if (product && product.image) { preview.src = product.image; preview.style.display = 'block'; }
      else { preview.style.display = 'none'; }
    }

    function closeProductForm() { document.getElementById('productFormOverlay').classList.remove('show'); }

    async function editProduct(id) {
      try {
        const res = await fetch(`${API_BASE}/admin/products`, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const product = (data.products || []).find(p => p.id === id);
        if (product) openProductForm(product);
      } catch(e) {}
    }

    async function uploadImage(input) {
      const file = input.files[0]; if (!file) return;
      const formData = new FormData(); formData.append('file', file);
      try {
        const res = await fetch(`${API_BASE}/admin/products/upload`, {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: formData
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('pImage').value = data.url;
          document.getElementById('pImagePreview').src = data.url;
          document.getElementById('pImagePreview').style.display = 'block';
        } else { alert(data.error || '上传失败'); }
      } catch(e) { alert('上传失败'); }
    }

    async function saveProduct() {
      const id = document.getElementById('editProductId').value;
      const body = {
        name: document.getElementById('pName').value.trim(),
        description: document.getElementById('pDesc').value.trim(),
        points: parseInt(document.getElementById('pPoints').value) || 0,
        stock: parseInt(document.getElementById('pStock').value) || 0,
        sort_order: parseInt(document.getElementById('pSort').value) || 0,
        is_active: document.getElementById('pActive').value === 'true',
        image: document.getElementById('pImage').value
      };
      if (!body.name) { alert('请输入商品名称'); return; }
      if (body.points <= 0) { alert('请输入正确的积分'); return; }
      try {
        const url = id ? `${API_BASE}/admin/products/${id}` : `${API_BASE}/admin/products`;
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(body)
        });
        if (res.ok) { closeProductForm(); loadProducts(); }
        else { const data = await res.json(); alert(data.error || '保存失败'); }
      } catch(e) { alert('保存失败'); }
    }

    async function deleteProduct(id, name) {
      if (!confirm(`确定删除商品「${name}」吗？`)) return;
      try {
        await fetch(`${API_BASE}/admin/products/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        loadProducts();
      } catch(e) {}
    }

    // ===== 活动管理 =====
    async function loadActivities() {
      try {
        const res = await fetch(`${API_BASE}/admin/activities`, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const list = data.activities || [];
        const el = document.getElementById('activityList');
        if (list.length === 0) { el.innerHTML = '<div class="empty-tip">暂无活动，点击右上角添加</div>'; return; }
        el.innerHTML = list.map(a => `
          <div class="product-card">
            <div class="product-img" style="display:flex;align-items:center;justify-content:center;font-size:30px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2)">🎯</div>
            <div class="product-info">
              <div class="product-name">${a.name}
                <span class="product-badge ${a.is_active ? 'badge-active' : 'badge-inactive'}">${a.is_active ? '启用' : '停用'}</span>
              </div>
              <div class="product-desc">${a.description || '暂无描述'}</div>
              <div class="product-meta">
                <div class="product-meta-item">增加 <b class="green">+${a.points}</b> 积分</div>
                <div class="product-meta-item">排序 ${a.sort_order}</div>
              </div>
            </div>
            <div class="product-actions">
              <button class="btn-edit" onclick="editActivity(${a.id})">编辑</button>
              <button class="btn-del" onclick="deleteActivity(${a.id}, '${a.name}')">删除</button>
            </div>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('activityList').innerHTML = '<div class="empty-tip">加载失败</div>';
      }
    }

    function openActivityForm(activity) {
      document.getElementById('activityFormOverlay').classList.add('show');
      document.getElementById('actFormTitle').textContent = activity ? '编辑活动' : '添加活动';
      document.getElementById('editActivityId').value = activity ? activity.id : '';
      document.getElementById('aName').value = activity ? activity.name : '';
      document.getElementById('aDesc').value = activity ? activity.description : '';
      document.getElementById('aPoints').value = activity ? activity.points : '';
      document.getElementById('aSort').value = activity ? activity.sort_order : 0;
      document.getElementById('aActive').value = activity ? String(activity.is_active) : 'true';
    }

    function closeActivityForm() { document.getElementById('activityFormOverlay').classList.remove('show'); }

    async function editActivity(id) {
      try {
        const res = await fetch(`${API_BASE}/admin/activities`, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const activity = (data.activities || []).find(a => a.id === id);
        if (activity) openActivityForm(activity);
      } catch(e) {}
    }

    async function saveActivity() {
      const id = document.getElementById('editActivityId').value;
      const body = {
        name: document.getElementById('aName').value.trim(),
        description: document.getElementById('aDesc').value.trim(),
        points: parseInt(document.getElementById('aPoints').value) || 0,
        sort_order: parseInt(document.getElementById('aSort').value) || 0,
        is_active: document.getElementById('aActive').value === 'true'
      };
      if (!body.name) { alert('请输入活动名称'); return; }
      if (body.points <= 0) { alert('请输入正确的积分数'); return; }
      try {
        const url = id ? `${API_BASE}/admin/activities/${id}` : `${API_BASE}/admin/activities`;
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(body)
        });
        if (res.ok) { closeActivityForm(); loadActivities(); }
        else { const data = await res.json(); alert(data.error || '保存失败'); }
      } catch(e) { alert('保存失败'); }
    }

    async function deleteActivity(id, name) {
      if (!confirm(`确定删除活动「${name}」吗？`)) return;
      try {
        await fetch(`${API_BASE}/admin/activities/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
        loadActivities();
      } catch(e) {}
    }

    // ===== 兑换记录 =====
    let currentSearchId = '';

    async function loadRecords(employeeId) {
      const el = document.getElementById('recordList');
      el.innerHTML = '<div class="empty-tip">加载中...</div>';
      try {
        let url = `${API_BASE}/admin/redemptions?page_size=100`;
        if (employeeId) url += `&search=${encodeURIComponent(employeeId)}`;
        const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const records = data.records || [];
        if (records.length === 0) { el.innerHTML = '<div class="empty-tip">暂无记录</div>'; return; }

        const typeLabel = { success: '兑换成功', failed: '兑换失败', refunded: '已退回', activity: '活动积分', quiz: '答题奖励' };
        el.innerHTML = records.map(r => {
          let pointsClass = r.status;
          let pointsText = '';
          if (r.status === 'refunded') {
            pointsText = '已退回';
          } else if (r.type === 'activity') {
            pointsClass = 'activity';
            pointsText = `+${r.points} 积分`;
          } else if (r.type === 'quiz') {
            pointsClass = 'quiz';
            pointsText = `+${r.points} 积分`;
          } else if (r.status === 'success') {
            pointsText = `-${r.points} 积分`;
          } else {
            pointsText = `${r.points} 积分`;
          }

          const statusClass = r.type === 'activity' ? 'activity' : r.type === 'quiz' ? 'quiz' : r.status;
          const statusText = r.type === 'activity' ? '活动积分' : r.type === 'quiz' ? '答题奖励' : (typeLabel[r.status] || r.status);

          return `
            <div class="record-item" id="record-${r.id}">
              <div class="record-top">
                <div class="record-user">${r.user_name}（${r.employee_id}）</div>
                <div class="record-points ${pointsClass}">${pointsText}</div>
              </div>
              <div class="record-mid">${r.type === 'activity' || r.type === 'quiz' ? '活动/奖励' : '商品'}：${r.product_name}</div>
              <div class="record-bottom">
                <div class="record-time">${new Date(r.created_at).toLocaleString('zh-CN')}</div>
                <div style="display:flex;align-items:center;gap:8px">
                  <span class="record-status ${statusClass}">${statusText}</span>
                  ${r.status === 'success' && r.type !== 'activity' && r.type !== 'quiz'
                    ? `<button class="btn-refund" onclick="refundRecord(${r.id}, '${r.user_name}', '${r.product_name}')">退回</button>`
                    : ''}
                  ${(r.type === 'activity') && r.status === 'success'
                    ? `<button class="btn-refund" onclick="refundRecord(${r.id}, '${r.user_name}', '${r.product_name}')">退回</button>`
                    : ''}
                </div>
              </div>
            </div>
          `;
        }).join('');
      } catch(e) {
        el.innerHTML = '<div class="empty-tip">加载失败</div>';
      }
    }

    function searchRecords() {
      const id = document.getElementById('searchEmployeeId').value.trim();
      currentSearchId = id;
      loadRecords(id || undefined);
    }

    function clearSearch() {
      document.getElementById('searchEmployeeId').value = '';
      currentSearchId = '';
      loadRecords();
    }

    async function refundRecord(id, userName, productName) {
      if (!confirm(`确定退回「${userName}」的「${productName}」吗？\n退回后积分将返还给用户。`)) return;
      try {
        const res = await fetch(`${API_BASE}/admin/redemptions/${id}/refund`, {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (res.ok) {
          showResultModal(
            'success', '↩️', '退回成功',
            `用户 <b>${data.user_name}</b> 的 <b>${data.product_name}</b> 已退回<br>` +
            `返还积分：<b>${data.points_refunded}</b><br>` +
            `用户当前可用积分：<b>${data.new_available}</b>`
          );
          loadRecords(currentSearchId || undefined);
        } else {
          alert(data.error || '退回失败');
        }
      } catch(e) { alert('网络错误，退回失败'); }
    }

    function logout() {
      localStorage.removeItem('quiz_token');
      localStorage.removeItem('quiz_user');
      window.location.href = '/app/login.html?redirect=' + encodeURIComponent('/shop/');
    }

    // 初始化
    loadScanProducts();
  </script>
</body>
</html>
