<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>积分商城管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; min-height: 100vh;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a0f1e;
      color: #fff;
    }

    /* 顶部导航 */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: rgba(10,15,30,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-title { font-size: 17px; font-weight: 700; }
    .nav-user { font-size: 12px; color: rgba(255,255,255,0.5); }
    .nav-logout {
      background: none; border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6); font-size: 12px;
      padding: 4px 10px; border-radius: 6px; cursor: pointer;
    }

    /* 标签页 */
    .tabs {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 49;
      background: rgba(10,15,30,0.95);
      display: flex; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .tab {
      flex: 1; text-align: center; padding: 12px;
      font-size: 14px; font-weight: 500;
      color: rgba(255,255,255,0.4);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: #0dd3ff; border-bottom-color: #0dd3ff; }

    .content { padding: 110px 16px 100px; max-width: 600px; margin: 0 auto; }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ===== 扫码兑换面板 ===== */
    .scan-section { text-align: center; padding: 20px 0; }
    .scan-btn {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a6fd4, #0dd3ff);
      border: none; color: #fff;
      font-size: 48px; cursor: pointer;
      box-shadow: 0 0 60px rgba(13,211,255,0.3);
      transition: all 0.3s;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .scan-btn span { font-size: 14px; margin-top: 8px; font-weight: 600; }
    .scan-btn:hover { transform: scale(1.05); box-shadow: 0 0 80px rgba(13,211,255,0.5); }
    .scan-btn:active { transform: scale(0.95); }
    .scan-tip { color: rgba(255,255,255,0.4); font-size: 13px; }

    /* 选择商品区 */
    .product-select {
      margin-top: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
    }
    .product-select-title {
      font-size: 15px; font-weight: 600; margin-bottom: 12px;
      color: rgba(255,255,255,0.8);
    }
    .product-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .product-option {
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer; transition: all 0.2s;
      text-align: center;
    }
    .product-option.selected {
      border-color: #0dd3ff;
      background: rgba(13,211,255,0.08);
    }
    .product-option:hover { background: rgba(255,255,255,0.06); }
    .product-option-img {
      width: 60px; height: 60px;
      border-radius: 8px;
      object-fit: cover;
      margin: 0 auto 8px;
      background: rgba(255,255,255,0.05);
      display: block;
    }
    .product-option-name {
      font-size: 13px; font-weight: 600; color: #fff;
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-option-points { font-size: 12px; color: #ffd700; font-weight: 700; }
    .product-option-stock { font-size: 11px; color: rgba(255,255,255,0.3); }

    /* 扫码结果 */
    .scan-result {
      margin-top: 20px; padding: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      display: none;
    }
    .scan-result.show { display: block; }
    .scan-result.success { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05); }
    .scan-result.error { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.05); }
    .result-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
    .result-msg { text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .result-detail { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.8; }

    /* ===== 商品管理面板 ===== */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .add-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #1a6fd4, #0dd3ff);
      border: none; border-radius: 10px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }

    .product-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      display: flex; gap: 14px; align-items: center;
    }
    .product-img {
      width: 70px; height: 70px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .product-desc {
      font-size: 12px; color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-meta { display: flex; gap: 12px; font-size: 12px; }
    .product-meta-item { color: rgba(255,255,255,0.5); }
    .product-meta-item b { color: #ffd700; }
    .product-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .product-actions button {
      padding: 6px 12px; border-radius: 8px;
      font-size: 12px; border: none; cursor: pointer;
      font-weight: 500;
    }
    .btn-edit { background: rgba(13,211,255,0.15); color: #0dd3ff; }
    .btn-del { background: rgba(239,68,68,0.15); color: #ef4444; }
    .product-badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 6px; font-size: 11px; font-weight: 500;
    }
    .badge-active { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-inactive { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* ===== 兑换记录面板 ===== */
    .record-item {
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .record-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .record-user { font-size: 14px; font-weight: 600; }
    .record-points { font-size: 14px; font-weight: 700; }
    .record-points.success { color: #22c55e; }
    .record-points.failed { color: #ef4444; }
    .record-mid { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
    .record-bottom { display: flex; justify-content: space-between; }
    .record-time { font-size: 12px; color: rgba(255,255,255,0.3); }
    .record-status { font-size: 11px; padding: 2px 8px; border-radius: 8px; }
    .record-status.success { background: rgba(34,197,94,0.15); color: #22c55e; }
    .record-status.failed { background: rgba(239,68,68,0.15); color: #ef4444; }
    .empty-tip { text-align: center; color: rgba(255,255,255,0.3); padding: 40px 0; font-size: 14px; }

    /* ===== 表单弹窗 ===== */
    .form-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none; align-items: center; justify-content: center;
    }
    .form-overlay.show { display: flex; }
    .form-modal {
      width: 90%; max-width: 420px;
      background: #0d1b3e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 24px;
      max-height: 85vh; overflow-y: auto;
    }
    .form-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; display: block; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff; font-size: 14px;
      font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: #0dd3ff; }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .form-img-preview {
      width: 80px; height: 80px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
      margin-top: 8px;
    }
    .form-upload-btn {
      padding: 8px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px dashed rgba(255,255,255,0.2);
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 13px; cursor: pointer;
      margin-top: 8px;
    }
    .form-btns { display: flex; gap: 10px; margin-top: 20px; }
    .form-btns button {
      flex: 1; padding: 12px;
      border-radius: 10px; border: none;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
    .btn-save { background: linear-gradient(135deg, #1a6fd4, #0dd3ff); color: #fff; }

    /* 摄像头扫码区域 */
    .camera-overlay {
      position: fixed; inset: 0;
      background: #000; z-index: 200;
      display: none;
    }
    .camera-overlay.show { display: flex; flex-direction: column; }
    .camera-video {
      flex: 1; width: 100%; object-fit: cover;
    }
    .camera-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 260px; height: 260px;
      border: 2px solid rgba(13,211,255,0.6);
      border-radius: 20px;
    }
    .camera-frame::before {
      content: ''; position: absolute; inset: -2px;
      border: 3px solid transparent;
      border-top-color: #0dd3ff; border-left-color: #0dd3ff;
      border-radius: 20px;
      width: 40px; height: 40px;
    }
    .camera-tip {
      position: absolute; bottom: 120px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }
    .camera-close {
      position: absolute; top: 20px; right: 20px;
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border: none; border-radius: 50%;
      color: #fff; font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    /* 手动输入区域 */
    .manual-input {
      margin-top: 20px; padding: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
    }
    .manual-title { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
    .manual-row { display: flex; gap: 8px; }
    .manual-row input {
      flex: 1; padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #fff; font-size: 14px;
    }
    .manual-row input:focus { outline: none; border-color: #0dd3ff; }
    .manual-row button {
      padding: 10px 16px;
      background: linear-gradient(135deg, #1a6fd4, #0dd3ff);
      border: none; border-radius: 8px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="nav">
    <div>
      <div class="nav-title">积分商城管理</div>
      <div class="nav-user" id="navUser">管理员</div>
    </div>
    <button class="nav-logout" onclick="logout()">退出</button>
  </div>

  <!-- 标签页 -->
  <div class="tabs">
    <div class="tab active" data-tab="scan" onclick="switchTab('scan')">扫码兑换</div>
    <div class="tab" data-tab="products" onclick="switchTab('products')">商品管理</div>
    <div class="tab" data-tab="records" onclick="switchTab('records')">兑换记录</div>
  </div>

  <div class="content">
    <!-- 扫码兑换面板 -->
    <div class="panel active" id="panel-scan">
      <!-- 先选择商品 -->
      <div class="product-select">
        <div class="product-select-title">请先选择要兑换的商品</div>
        <div class="product-grid" id="productGrid">
          <!-- 动态加载 -->
        </div>
      </div>

      <!-- 扫码按钮 -->
      <div class="scan-section">
        <button class="scan-btn" id="scanBtn" onclick="startScan()" disabled style="opacity:0.5">
          📷
          <span>扫码兑换</span>
        </button>
        <div class="scan-tip" id="scanTip">请先选择商品</div>
      </div>

      <!-- 手动输入二维码 -->
      <div class="manual-input">
        <div class="manual-title">或手动输入二维码内容</div>
        <div class="manual-row">
          <input type="text" id="manualQR" placeholder="粘贴二维码内容">
          <button onclick="manualRedeem()">兑换</button>
        </div>
      </div>

      <!-- 扫码结果 -->
      <div class="scan-result" id="scanResult">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-msg" id="resultMsg"></div>
        <div class="result-detail" id="resultDetail"></div>
      </div>
    </div>

    <!-- 商品管理面板 -->
    <div class="panel" id="panel-products">
      <div class="section-header">
        <div class="section-title">商品列表</div>
        <button class="add-btn" onclick="openProductForm()">+ 添加商品</button>
      </div>
      <div id="productList"></div>
    </div>

    <!-- 兑换记录面板 -->
    <div class="panel" id="panel-records">
      <div class="section-header">
        <div class="section-title">兑换记录</div>
      </div>
      <div id="recordList"></div>
    </div>
  </div>

  <!-- 商品编辑弹窗 -->
  <div class="form-overlay" id="productFormOverlay">
    <div class="form-modal">
      <div class="form-title" id="formTitle">添加商品</div>
      <input type="hidden" id="editProductId">
      <div class="form-group">
        <label class="form-label">商品名称 *</label>
        <input class="form-input" id="pName" placeholder="请输入商品名称">
      </div>
      <div class="form-group">
        <label class="form-label">商品描述</label>
        <textarea class="form-textarea" id="pDesc" placeholder="请输入商品描述"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">所需积分 *</label>
          <input class="form-input" id="pPoints" type="number" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">库存数量</label>
          <input class="form-input" id="pStock" type="number" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">排序</label>
          <input class="form-input" id="pSort" type="number" placeholder="0" value="0">
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <select class="form-select form-input" id="pActive">
            <option value="true">上架</option>
            <option value="false">下架</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">商品图片</label>
        <input type="file" id="pImageFile" accept="image/*" style="display:none" onchange="uploadImage(this)">
        <button class="form-upload-btn" onclick="document.getElementById('pImageFile').click()">选择图片上传</button>
        <input type="hidden" id="pImage">
        <img class="form-img-preview" id="pImagePreview" style="display:none">
      </div>
      <div class="form-btns">
        <button class="btn-cancel" onclick="closeProductForm()">取消</button>
        <button class="btn-save" onclick="saveProduct()">保存</button>
      </div>
    </div>
  </div>

  <!-- 摄像头扫码 -->
  <div class="camera-overlay" id="cameraOverlay">
    <video class="camera-video" id="cameraVideo" autoplay playsinline></video>
    <div class="camera-frame"></div>
    <div class="camera-tip">将二维码放入框内自动识别</div>
    <button class="camera-close" onclick="stopScan()">×</button>
  </div>

  <!-- jsQR 库 -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    const API_BASE = '/api';
    const token = localStorage.getItem('quiz_token');
    const user = JSON.parse(localStorage.getItem('quiz_user') || '{}');

    if (!token || !user.is_admin) {
      window.location.href = '/app/login.html';
    }

    document.getElementById('navUser').textContent = user.name || '管理员';

    let selectedProductId = null;
    let products = [];
    let cameraStream = null;
    let scanAnimFrame = null;

    // ===== 标签页切换 =====
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');

      if (tab === 'scan') loadScanProducts();
      if (tab === 'products') loadProducts();
      if (tab === 'records') loadRecords();
    }

    // ===== 扫码兑换 =====
    async function loadScanProducts() {
      try {
        const res = await fetch(`${API_BASE}/products`);
        const data = await res.json();
        products = (data.products || []).filter(p => p.stock > 0);
        renderProductGrid();
      } catch(e) {}
    }

    function renderProductGrid() {
      const grid = document.getElementById('productGrid');
      if (products.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.3);padding:20px">暂无可兑换商品</div>';
        return;
      }
      grid.innerHTML = products.map(p => `
        <div class="product-option ${selectedProductId === p.id ? 'selected' : ''}" onclick="selectProduct(${p.id})">
          ${p.image ? `<img class="product-option-img" src="${p.image}">` : '<div class="product-option-img" style="display:flex;align-items:center;justify-content:center;font-size:24px">🎁</div>'}
          <div class="product-option-name">${p.name}</div>
          <div class="product-option-points">${p.points} 积分</div>
          <div class="product-option-stock">库存 ${p.stock}</div>
        </div>
      `).join('');
    }

    function selectProduct(id) {
      selectedProductId = id;
      renderProductGrid();
      document.getElementById('scanBtn').disabled = false;
      document.getElementById('scanBtn').style.opacity = '1';
      const p = products.find(x => x.id === id);
      document.getElementById('scanTip').textContent = `已选择：${p.name}（${p.points}积分）`;
    }

    function startScan() {
      if (!selectedProductId) { alert('请先选择商品'); return; }
      const overlay = document.getElementById('cameraOverlay');
      overlay.classList.add('show');

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      }).then(stream => {
        cameraStream = stream;
        const video = document.getElementById('cameraVideo');
        video.srcObject = stream;
        video.play();
        scanQRCode();
      }).catch(err => {
        alert('无法访问摄像头：' + err.message + '\n请使用手动输入方式');
        stopScan();
      });
    }

    function scanQRCode() {
      const video = document.getElementById('cameraVideo');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code) {
            stopScan();
            doRedeem(code.data);
            return;
          }
        }
        scanAnimFrame = requestAnimationFrame(tick);
      }
      tick();
    }

    function stopScan() {
      document.getElementById('cameraOverlay').classList.remove('show');
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      if (scanAnimFrame) {
        cancelAnimationFrame(scanAnimFrame);
        scanAnimFrame = null;
      }
    }

    function manualRedeem() {
      const qrData = document.getElementById('manualQR').value.trim();
      if (!qrData) { alert('请输入二维码内容'); return; }
      if (!selectedProductId) { alert('请先选择商品'); return; }
      doRedeem(qrData);
    }

    async function doRedeem(qrData) {
      const result = document.getElementById('scanResult');
      result.className = 'scan-result show';
      document.getElementById('resultIcon').textContent = '⏳';
      document.getElementById('resultMsg').textContent = '兑换处理中...';
      document.getElementById('resultDetail').textContent = '';

      try {
        const res = await fetch(`${API_BASE}/admin/redeem`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            qr_data: qrData,
            product_id: selectedProductId
          })
        });
        const data = await res.json();

        if (res.ok) {
          result.className = 'scan-result show success';
          document.getElementById('resultIcon').textContent = '✅';
          document.getElementById('resultMsg').textContent = '兑换成功！';
          document.getElementById('resultDetail').innerHTML =
            `用户：${data.user_name}（${data.employee_id}）<br>` +
            `商品：${data.product_name}<br>` +
            `消耗积分：${data.points_cost}<br>` +
            `剩余积分：${data.remaining_points}`;
          loadScanProducts();
        } else {
          result.className = 'scan-result show error';
          document.getElementById('resultIcon').textContent = '❌';
          document.getElementById('resultMsg').textContent = '兑换失败';
          document.getElementById('resultDetail').textContent = data.error || '未知错误';
          if (data.required_points && data.available_points !== undefined) {
            document.getElementById('resultDetail').innerHTML +=
              `<br>需要 ${data.required_points} 积分，当前可用 ${data.available_points} 积分`;
          }
        }
      } catch(e) {
        result.className = 'scan-result show error';
        document.getElementById('resultIcon').textContent = '❌';
        document.getElementById('resultMsg').textContent = '网络错误';
        document.getElementById('resultDetail').textContent = '请检查网络连接后重试';
      }
    }

    // ===== 商品管理 =====
    async function loadProducts() {
      try {
        const res = await fetch(`${API_BASE}/admin/products`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const list = data.products || [];
        const el = document.getElementById('productList');

        if (list.length === 0) {
          el.innerHTML = '<div class="empty-tip">暂无商品，点击右上角添加</div>';
          return;
        }

        el.innerHTML = list.map(p => `
          <div class="product-card">
            ${p.image ? `<img class="product-img" src="${p.image}">` : '<div class="product-img" style="display:flex;align-items:center;justify-content:center;font-size:28px">🎁</div>'}
            <div class="product-info">
              <div class="product-name">${p.name}
                <span class="product-badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">${p.is_active ? '上架' : '下架'}</span>
              </div>
              <div class="product-desc">${p.description || '暂无描述'}</div>
              <div class="product-meta">
                <div class="product-meta-item"><b>${p.points}</b> 积分</div>
                <div class="product-meta-item">库存 <b>${p.stock}</b></div>
                <div class="product-meta-item">排序 ${p.sort_order}</div>
              </div>
            </div>
            <div class="product-actions">
              <button class="btn-edit" onclick="editProduct(${p.id})">编辑</button>
              <button class="btn-del" onclick="deleteProduct(${p.id}, '${p.name}')">删除</button>
            </div>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('productList').innerHTML = '<div class="empty-tip">加载失败</div>';
      }
    }

    function openProductForm(product) {
      document.getElementById('productFormOverlay').classList.add('show');
      document.getElementById('formTitle').textContent = product ? '编辑商品' : '添加商品';
      document.getElementById('editProductId').value = product ? product.id : '';
      document.getElementById('pName').value = product ? product.name : '';
      document.getElementById('pDesc').value = product ? product.description : '';
      document.getElementById('pPoints').value = product ? product.points : '';
      document.getElementById('pStock').value = product ? product.stock : '';
      document.getElementById('pSort').value = product ? product.sort_order : 0;
      document.getElementById('pActive').value = product ? String(product.is_active) : 'true';
      document.getElementById('pImage').value = product ? (product.image || '') : '';

      const preview = document.getElementById('pImagePreview');
      if (product && product.image) {
        preview.src = product.image;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    }

    function closeProductForm() {
      document.getElementById('productFormOverlay').classList.remove('show');
    }

    async function editProduct(id) {
      try {
        const res = await fetch(`${API_BASE}/admin/products`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const product = (data.products || []).find(p => p.id === id);
        if (product) openProductForm(product);
      } catch(e) {}
    }

    async function uploadImage(input) {
      const file = input.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch(`${API_BASE}/admin/products/upload`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: formData
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('pImage').value = data.url;
          document.getElementById('pImagePreview').src = data.url;
          document.getElementById('pImagePreview').style.display = 'block';
        } else {
          alert(data.error || '上传失败');
        }
      } catch(e) {
        alert('上传失败');
      }
    }

    async function saveProduct() {
      const id = document.getElementById('editProductId').value;
      const body = {
        name: document.getElementById('pName').value.trim(),
        description: document.getElementById('pDesc').value.trim(),
        points: parseInt(document.getElementById('pPoints').value) || 0,
        stock: parseInt(document.getElementById('pStock').value) || 0,
        sort_order: parseInt(document.getElementById('pSort').value) || 0,
        is_active: document.getElementById('pActive').value === 'true',
        image: document.getElementById('pImage').value
      };

      if (!body.name) { alert('请输入商品名称'); return; }
      if (body.points <= 0) { alert('请输入正确的积分'); return; }

      try {
        const url = id ? `${API_BASE}/admin/products/${id}` : `${API_BASE}/admin/products`;
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method, headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(body)
        });

        if (res.ok) {
          // 如果有图片但不是通过上传的，需要单独更新
          if (id && body.image) {
            await fetch(`${API_BASE}/admin/products/${id}`, {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
              },
              body: JSON.stringify({ image: body.image })
            });
          }
          closeProductForm();
          loadProducts();
        } else {
          const data = await res.json();
          alert(data.error || '保存失败');
        }
      } catch(e) {
        alert('保存失败');
      }
    }

    async function deleteProduct(id, name) {
      if (!confirm(`确定删除商品「${name}」吗？`)) return;
      try {
        await fetch(`${API_BASE}/admin/products/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        loadProducts();
      } catch(e) {}
    }

    // ===== 兑换记录 =====
    async function loadRecords() {
      try {
        const res = await fetch(`${API_BASE}/admin/redemptions?page_size=50`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const records = data.records || [];
        const el = document.getElementById('recordList');

        if (records.length === 0) {
          el.innerHTML = '<div class="empty-tip">暂无兑换记录</div>';
          return;
        }

        el.innerHTML = records.map(r => `
          <div class="record-item">
            <div class="record-top">
              <div class="record-user">${r.user_name}（${r.employee_id}）</div>
              <div class="record-points ${r.status}">${r.status === 'success' ? '-' : ''}${r.points} 积分</div>
            </div>
            <div class="record-mid">商品：${r.product_name}</div>
            <div class="record-bottom">
              <div class="record-time">${new Date(r.created_at).toLocaleString('zh-CN')}</div>
              <div class="record-status ${r.status}">${r.status === 'success' ? '兑换成功' : '兑换失败'}</div>
            </div>
          </div>
        `).join('');
      } catch(e) {
        document.getElementById('recordList').innerHTML = '<div class="empty-tip">加载失败</div>';
      }
    }

    function logout() {
      localStorage.removeItem('quiz_token');
      localStorage.removeItem('quiz_user');
      window.location.href = '/app/login.html';
    }

    // 初始化
    loadScanProducts();
  </script>
</body>
</html>
